name: Package VSIX

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  package:
    name: Build and publish VSIX package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck host
        run: npm run typecheck

      - name: Typecheck webviews
        run: npm run typecheck:webview

      - name: Package VSIX
        run: |
          mkdir -p dist
          npm run package -- --out dist/gitstorm.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitstorm-vsix
          path: dist/*.vsix
          if-no-files-found: error

      - name: Prepare npm package for GitHub Packages
        shell: bash
        run: |
          set -euo pipefail

          EXTENSION_VERSION="$(node -p "require('./package.json').version")"
          OWNER_SCOPE="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          PACKAGE_DIR="dist/npm-package"

          mkdir -p "${PACKAGE_DIR}"
          cp dist/*.vsix "${PACKAGE_DIR}/"
          cp README.md "${PACKAGE_DIR}/README.md"

          node -e "
          const fs = require('fs');
          const pkg = {
            name: '@${OWNER_SCOPE}/gitstorm-vsix',
            version: '${EXTENSION_VERSION}',
            description: 'Packaged VSIX build of GitStorm for VS Code',
            license: 'MIT',
            repository: {
              type: 'git',
              url: 'git+https://github.com/${GITHUB_REPOSITORY}.git'
            },
            publishConfig: {
              registry: 'https://npm.pkg.github.com'
            },
            files: ['*.vsix', 'README.md']
          };
          fs.writeFileSync('${PACKAGE_DIR}/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish to GitHub Packages
        working-directory: dist/npm-package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish
